          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn build-renders-enterprise
          else
            yarn build-renders
          fi

      - name: 准备并校验 Windows x64 引擎
        if: ${{ inputs.include_engine }}
        id: engine
        shell: bash
        env:
          REQUESTED_ENGINE_VERSION: ${{ inputs.engine_version }}
          ENGINE_ASSET: yak_windows_amd64.exe
          DEFER_ENGINE_ARCHIVE: 'false'
        run: node packageScript/script/prepare-renyan-engine.js prepare

      - name: 生成 RuiYan Windows x64 安装文件
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}
        run: |
          if [ "${PACKAGE_EDITION}" = "enterprise-no-license" ]; then
            yarn pack-renyan-win-x64-enterprise-no-license-unsigned
          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn pack-renyan-win-x64-enterprise-unsigned
          else
            yarn pack-renyan-win-x64-unsigned
          fi

      - name: 签名 RuiYan Windows x64 安装文件
        if: ${{ inputs.sign_installers }}
        uses: ./.github/actions/sign-windows
        with:
          path: release
          pattern: '*windows-x64.exe'
          key-vault-url: ${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_URI }}
          key-vault-client-id: ${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_APPLICATION_ID }}
          key-vault-tenant-id: ${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_DIRECTORY_ID }}
          key-vault-client-secret: ${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CLIENT_SECRET }}
          key-vault-certificate: ${{ secrets.AZURE_YAK_CODE_SIGN_KEY_VAULT_CERT_NAME }}

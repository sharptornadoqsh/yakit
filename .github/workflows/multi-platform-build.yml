          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn pack-renyan-mac-arm64-enterprise-unsigned
          else
            yarn pack-renyan-mac-arm64-unsigned
          fi

      - name: 生成 RuiYan macOS arm64 签名安装文件
        if: ${{ inputs.sign_installers }}
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}

name: RuiYan Multi-Platform Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: 选择安装文件的平台和架构
        required: true
        type: choice
        default: macos-both
        options:
          - macos-x64
          - macos-arm64
          - macos-both
          - windows-x64
          - linux-x64
          - linux-arm64
          - all
      edition:
        description: 选择社区版、企业版或企业版免许可证客户端
        required: true
        type: choice
        default: community
        options:
          - community
          - enterprise
          - enterprise-no-license
      include_engine:
        description: 是否在安装文件中预置对应平台和架构的 Yak 引擎
        required: false
        type: boolean
        default: false
      engine_version:
        description: 预置引擎版本；留空时读取项目兼容清单中的推荐版本
        required: false
        type: string
      sign_installers:
        description: 是否启用安装文件签名；仓库未配置对应凭据时保持 false
        required: false
        type: boolean
        default: false
      retention_days:
        description: 安装文件产物的保留天数
        required: true
        type: choice
        default: '14'
        options:
          - '7'
          - '14'
          - '30'

permissions:
  contents: read

env:
  RUIYAN_CHROME_EXTENSION_SHA256: f3a19aeb5bcd5cbcb94d6d648147b6e173dd1ed6db753f91882d58f3e6a20b41

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target }}-${{ inputs.edition }}
  cancel-in-progress: true

jobs:
  build-macos-x64:
    name: RuiYan macOS x64 Package
    if: ${{ inputs.target == 'macos-x64' || inputs.target == 'macos-both' || inputs.target == 'all' }}
    runs-on: macos-15-intel
    timeout-minutes: 90
    env:
      CI: ''
      NODE_OPTIONS: --max_old_space_size=4096
      INCLUDE_ENGINE: ${{ inputs.include_engine }}
      RENYAN_PACKAGE_ARCHITECTURE: x64
    steps:
      - name: 验证 RuiYan 构建分支
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "qsh" ]; then
            echo "只允许从 qsh 分支构建睿眼安装文件" >&2
            exit 1
          fi

      - name: 检出 RuiYan 源码
        uses: actions/checkout@v7

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            app/renderer/src/main/yarn.lock
            app/renderer/engine-link-startup/yarn.lock

      - name: 安装固定依赖
        shell: bash
        run: |
          yarn install --frozen-lockfile
          yarn install-render --frozen-lockfile
          yarn install-link-render --frozen-lockfile

      - name: 校验仓库内置浏览器扩展
        shell: bash
        run: |
          node -e "const fs=require('fs');const crypto=require('crypto');const file='bins/scripts/google-chrome-plugin.zip';if(!fs.existsSync(file))throw new Error('仓库内置浏览器扩展不存在');const actual=crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');if(actual!==process.env.RUIYAN_CHROME_EXTENSION_SHA256)throw new Error('浏览器扩展摘要不匹配')"

      - name: 构建 RuiYan 渲染器
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}
        run: |
          if [ "${PACKAGE_EDITION}" = "enterprise-no-license" ]; then
            yarn build-renders-enterprise-no-license
          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn build-renders-enterprise
          else
            yarn build-renders
          fi

      - name: 准备并校验 macOS x64 引擎
        if: ${{ inputs.include_engine }}
        id: engine
        shell: bash
        env:
          REQUESTED_ENGINE_VERSION: ${{ inputs.engine_version }}
          ENGINE_ASSET: yak_darwin_amd64
          DEFER_ENGINE_ARCHIVE: ${{ inputs.sign_installers }}
        run: node packageScript/script/prepare-renyan-engine.js prepare

      - name: 校验苹果签名凭据并导入证书
        if: ${{ inputs.sign_installers }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ACCOUNT_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          ENGINE_ASSET: yak_darwin_amd64
        run: |
          for name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CERT_BASE64 CERT_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "缺少苹果签名凭据：${name}" >&2
              exit 1
            fi
          done
          chmod +x packageScript/script/signature.sh
          packageScript/script/signature.sh build
          if [ "${INCLUDE_ENGINE}" = "true" ]; then
            CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep -F "${APPLE_TEAM_ID}" | head -n1 | awk -F\" '{print $2}')
            if [ -z "${CERT_ID:-}" ]; then
              echo "未找到对应团队的苹果签名证书" >&2
              exit 1
            fi
            codesign --timestamp --options runtime --sign "${CERT_ID}" "bins/${ENGINE_ASSET}"
            node packageScript/script/prepare-renyan-engine.js archive
          fi

      - name: 生成 RuiYan macOS x64 无签名安装文件
        if: ${{ !inputs.sign_installers }}
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}
        run: |
          if [ "${PACKAGE_EDITION}" = "enterprise-no-license" ]; then
            yarn pack-renyan-mac-x64-enterprise-no-license-unsigned
          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn pack-renyan-mac-x64-enterprise-unsigned
          else
            yarn pack-renyan-mac-x64-unsigned
          fi

      - name: 生成 RuiYan macOS x64 签名安装文件
        if: ${{ inputs.sign_installers }}
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}
          APPLE_ID: ${{ secrets.APPLE_ACCOUNT_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ "${PACKAGE_EDITION}" = "enterprise-no-license" ]; then
            yarn pack-renyan-mac-x64-enterprise-no-license-signed
          elif [ "${PACKAGE_EDITION}" = "enterprise" ]; then
            yarn pack-renyan-mac-x64-enterprise-signed
          else
            yarn pack-renyan-mac-x64-signed
          fi

      - name: 生成 RuiYan 构建清单与摘要
        id: metadata
        shell: bash
        env:
          PACKAGE_EDITION: ${{ inputs.edition }}
          PACKAGE_TARGET: macos-x64
          PACKAGE_SIGNED: ${{ inputs.sign_installers }}
          INCLUDE_ENGINE: ${{ inputs.include_engine }}
        run: node packageScript/script/create-renyan-build-metadata.js

      - name: 上传 RuiYan macOS x64 产物
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.metadata.outputs.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}

      - name: 清理苹果签名临时文件
        if: ${{ always() && inputs.sign_installers }}
        shell: bash
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true

  build-macos-arm64:
    name: RuiYan macOS arm64 Package
    if: ${{ inputs.target == 'macos-arm64' || inputs.target == 'macos-both' || inputs.target == 'all' }}
    runs-on: macos-15
